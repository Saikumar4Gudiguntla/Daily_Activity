name: Daily Activity
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:  # lets you trigger it manually too

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - run: |
          echo "$(date)" >> activity.log
          git config user.email "saikumar@youremail.com"
          git config user.name "Saikumar4Gudiguntla"
          git add .
          git commit -m "Daily update $(date +'%Y-%m-%d')"
          git push

